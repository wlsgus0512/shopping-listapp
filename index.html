<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
      padding: 0 2px;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #e53e3e;
      cursor: pointer;
      font-size: 0.85rem;
      text-decoration: underline;
    }

    .clear-btn:hover {
      color: #c53030;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      transition: opacity 0.2s, background 0.2s;
    }

    li.checked {
      background: #f0fff4;
      border-color: #c6f6d5;
      opacity: 0.7;
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #48bb78;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-word;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." />
      <button onclick="addItem()">추가</button>
    </div>

    <div class="stats">
      <span id="statsText">총 0개</span>
      <button class="clear-btn" onclick="clearChecked()">완료 항목 삭제</button>
    </div>

    <ul id="list"></ul>
    <p class="empty" id="empty">아직 아이템이 없습니다.</p>
  </div>

  <script>
    // 1. localStorage 가용성 확인 (MDN 권장 패턴)
    function storageAvailable() {
      try {
        const x = '__storage_test__';
        localStorage.setItem(x, x);
        localStorage.removeItem(x);
        return true;
      } catch (e) {
        return false;
      }
    }

    function loadItems() {
      if (!storageAvailable()) return [];
      try {
        return JSON.parse(localStorage.getItem('shoppingList') || '[]');
      } catch (e) {
        return [];
      }
    }

    function save() {
      if (!storageAvailable()) return;
      try {
        localStorage.setItem('shoppingList', JSON.stringify(items));
      } catch (e) {
        // QuotaExceededError 등 무시
      }
    }

    let items = loadItems();

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const stats = document.getElementById('statsText');

      const checked = items.filter(i => i.checked).length;
      stats.textContent = `총 ${items.length}개 (완료 ${checked}개)`;
      empty.style.display = items.length === 0 ? 'block' : 'none';

      list.innerHTML = '';
      items.forEach((item, idx) => {
        // 2. createElement + addEventListener 방식 (MDN 권장 패턴)
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = item.checked;
        checkbox.addEventListener('change', () => toggleItem(idx));

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;

        const btn = document.createElement('button');
        btn.className = 'delete-btn';
        btn.title = '삭제';
        btn.textContent = '✕';
        btn.addEventListener('click', () => deleteItem(idx));

        li.append(checkbox, span, btn);
        list.appendChild(li);
      });
    }

    function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;
      items.push({ text, checked: false });
      input.value = '';
      save();
      render();
    }

    function toggleItem(idx) {
      items[idx].checked = !items[idx].checked;
      save();
      render();
    }

    function deleteItem(idx) {
      items.splice(idx, 1);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(i => !i.checked);
      save();
      render();
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
