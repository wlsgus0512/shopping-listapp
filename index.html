<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .input-row button:disabled {
      background: #a0aec0;
      cursor: not-allowed;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
      padding: 0 2px;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #e53e3e;
      cursor: pointer;
      font-size: 0.85rem;
      text-decoration: underline;
    }

    .clear-btn:hover {
      color: #c53030;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      transition: opacity 0.2s, background 0.2s;
    }

    li.checked {
      background: #f0fff4;
      border-color: #c6f6d5;
      opacity: 0.7;
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #48bb78;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-word;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }

    .loading {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." />
      <button id="addBtn" onclick="addItem()">추가</button>
    </div>

    <div class="stats">
      <span id="statsText">총 0개</span>
      <button class="clear-btn" onclick="clearChecked()">완료 항목 삭제</button>
    </div>

    <ul id="list"></ul>
    <p class="loading" id="loading">불러오는 중...</p>
    <p class="empty" id="empty" style="display:none">아직 아이템이 없습니다.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://nbxhcpsuguvbadlyhrsm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ieGhjcHN1Z3V2YmFkbHlocnNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDA4MDgsImV4cCI6MjA5MTIxNjgwOH0.nUmeSoe5PjHAjDmmgW6fa-V0V8ciKnu02YVqWaIf_Iw';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    let items = [];

    async function loadItems() {
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });

      document.getElementById('loading').style.display = 'none';

      if (error) {
        console.error('불러오기 실패:', error);
        return;
      }

      items = data;
      render();
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const stats = document.getElementById('statsText');

      const checked = items.filter(i => i.checked).length;
      stats.textContent = `총 ${items.length}개 (완료 ${checked}개)`;
      empty.style.display = items.length === 0 ? 'block' : 'none';

      list.innerHTML = '';
      items.forEach(item => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = item.checked;
        checkbox.addEventListener('change', () => toggleItem(item.id, item.checked));

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;

        const btn = document.createElement('button');
        btn.className = 'delete-btn';
        btn.title = '삭제';
        btn.textContent = '✕';
        btn.addEventListener('click', () => deleteItem(item.id));

        li.append(checkbox, span, btn);
        list.appendChild(li);
      });
    }

    async function addItem() {
      const input = document.getElementById('itemInput');
      const addBtn = document.getElementById('addBtn');
      const text = input.value.trim();
      if (!text) return;

      addBtn.disabled = true;
      const { data, error } = await db
        .from('shopping_items')
        .insert({ text, checked: false })
        .select()
        .single();

      addBtn.disabled = false;

      if (error) {
        console.error('추가 실패:', error);
        return;
      }

      items.push(data);
      input.value = '';
      render();
    }

    async function toggleItem(id, currentChecked) {
      const { error } = await db
        .from('shopping_items')
        .update({ checked: !currentChecked })
        .eq('id', id);

      if (error) {
        console.error('수정 실패:', error);
        return;
      }

      const item = items.find(i => i.id === id);
      if (item) item.checked = !currentChecked;
      render();
    }

    async function deleteItem(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) {
        console.error('삭제 실패:', error);
        return;
      }

      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearChecked() {
      const checkedIds = items.filter(i => i.checked).map(i => i.id);
      if (checkedIds.length === 0) return;

      const { error } = await db
        .from('shopping_items')
        .delete()
        .in('id', checkedIds);

      if (error) {
        console.error('삭제 실패:', error);
        return;
      }

      items = items.filter(i => !i.checked);
      render();
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    loadItems();
  </script>
</body>
</html>
